<ng-container *ngIf="isAuthenticated">
  <mat-toolbar color="primary" class="shadow-md">
    <button mat-icon-button (click)="drawer.toggle()">
      <mat-icon>menu</mat-icon>
    </button>
    <span class="ml-4">{{ title }}</span>
    
    <span class="spacer"></span>
    
    <button mat-button [matMenuTriggerFor]="userMenu" *ngIf="usuarioLogado">
      <mat-icon>account_circle</mat-icon>
      <span class="ml-2">{{ usuarioLogado.nome }}</span>
    </button>
    
    <mat-menu #userMenu="matMenu">
      <div class="user-info" mat-menu-item disabled>
        <div class="user-name">{{ usuarioLogado?.nome }}</div>
        <div class="user-email">{{ usuarioLogado?.email }}</div>
        <div class="user-role">{{ getPerfilNome(usuarioLogado?.perfil!) }}</div>
      </div>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="trocarSenha()">
        <mat-icon>lock</mat-icon>
        <span>Trocar Senha</span>
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="logout()">
        <mat-icon>exit_to_app</mat-icon>
        <span>Sair</span>
      </button>
    </mat-menu>
  </mat-toolbar>

  <mat-drawer-container class="h-full">
    <mat-drawer #drawer mode="side" opened class="w-64">
      <mat-nav-list>
        <ng-container *ngFor="let item of menuItems">
          <a mat-list-item 
             [routerLink]="item.path"
             routerLinkActive="bg-blue-100"
             class="hover:bg-gray-100"
             *ngIf="podeVerMenuItem(item)">
            <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
            <span matListItemTitle>{{ item.label }}</span>
          </a>
        </ng-container>
      </mat-nav-list>
    </mat-drawer>

    <mat-drawer-content class="p-6 bg-gray-50">
      <router-outlet></router-outlet>
    </mat-drawer-content>
  </mat-drawer-container>
</ng-container>

<div *ngIf="!isAuthenticated" class="auth-container">
  <router-outlet></router-outlet>
</div>
