<div class="container-custom">
  <div class="page-header">
    <h1 class="text-3xl font-bold">Clientes</h1>
    <!-- Removido botão de novo cliente (somente consulta) -->
  </div>

  <mat-card>
    <mat-card-content>
      <div class="filter-container mb-4">
        <mat-form-field appearance="fill" class="filter-field">
          <mat-label>Filtrar por Nome</mat-label>
          <input matInput #campoFiltro [(ngModel)]="filtroNome" (keyup.enter)="filtrar()" placeholder="Digite o nome do cliente">
          <mat-icon matSuffix>search</mat-icon>
        </mat-form-field>
        <button mat-raised-button color="primary" (click)="filtrar()" class="ml-2">
          <mat-icon>search</mat-icon>
          Filtrar
        </button>
        <button mat-raised-button (click)="limparFiltro()" class="ml-2" *ngIf="filtroNome">
          <mat-icon>clear</mat-icon>
          Limpar
        </button>
      </div>

      <div class="table-container">
        <table mat-table [dataSource]="clientes" class="w-full">
          <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef class="font-bold">ID</th>
            <td mat-cell *matCellDef="let cliente">{{ cliente.id }}</td>
          </ng-container>

          <ng-container matColumnDef="nome">
            <th mat-header-cell *matHeaderCellDef class="font-bold">Nome</th>
            <td mat-cell *matCellDef="let cliente">{{ cliente.nome }}</td>
          </ng-container>

          <ng-container matColumnDef="uf">
            <th mat-header-cell *matHeaderCellDef class="font-bold">UF</th>
            <td mat-cell *matCellDef="let cliente">{{ cliente.uf }}</td>
          </ng-container>

          <ng-container matColumnDef="cidade">
            <th mat-header-cell *matHeaderCellDef class="font-bold">Cidade</th>
            <td mat-cell *matCellDef="let cliente">{{ cliente.cidade }}</td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef class="font-bold text-right">Ações</th>
            <td mat-cell *matCellDef="let cliente" class="text-right">
              <button mat-icon-button color="primary" [routerLink]="['/clientes', cliente.id, 'detalhe']" matTooltip="Consultar Cliente">
                <mat-icon>visibility</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
      </div>

      <div *ngIf="clientes.length === 0 && !loading" class="text-center py-8 text-gray-500">
        Nenhum cliente cadastrado
      </div>

      <div *ngIf="loading" class="text-center py-8">
        Carregando...
      </div>

      <mat-paginator
        *ngIf="clientes.length > 0"
        [length]="totalCount"
        [pageSize]="pageSize"
        [pageIndex]="pageNumber - 1"
        [pageSizeOptions]="pageSizeOptions"
        (page)="onPageChange($event)"
        showFirstLastButtons
        aria-label="Selecione a página">
      </mat-paginator>
    </mat-card-content>
  </mat-card>
</div>
