<div class="container-custom">
  <div class="page-header">
    <h1 class="text-3xl font-bold">Assuntos</h1>
    <button mat-raised-button color="primary" routerLink="/assuntos/novo">
      <mat-icon>add</mat-icon>
      Novo Assunto
    </button>
  </div>

  <mat-card>
    <mat-card-content>
      <div class="filter-section mb-4">
        <mat-form-field appearance="fill" class="w-full md:w-96">
          <mat-label>Filtrar por tipo de assunto</mat-label>
          <input matInput #campoFiltro [(ngModel)]="filtroTipoAssunto" (keyup.enter)="aplicarFiltro()" placeholder="Digite o tipo de assunto">
          <button mat-icon-button matSuffix (click)="aplicarFiltro()" *ngIf="filtroTipoAssunto">
            <mat-icon>search</mat-icon>
          </button>
          <button mat-icon-button matSuffix (click)="limparFiltro()" *ngIf="filtroTipoAssunto">
            <mat-icon>clear</mat-icon>
          </button>
        </mat-form-field>
      </div>

      <div class="table-container">
        <table mat-table [dataSource]="assuntos" class="w-full">
          <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef class="font-bold">ID</th>
            <td mat-cell *matCellDef="let assunto">{{ assunto.id }}</td>
          </ng-container>

          <ng-container matColumnDef="tipoAssunto">
            <th mat-header-cell *matHeaderCellDef class="font-bold">Tipo de Assunto</th>
            <td mat-cell *matCellDef="let assunto">{{ assunto.tipoAssunto }}</td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef class="font-bold text-right">Ações</th>
            <td mat-cell *matCellDef="let assunto" class="text-right">
              <button mat-icon-button color="primary" [routerLink]="['/assuntos', assunto.id]">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button color="warn" (click)="deleteAssunto(assunto.id)">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
      </div>

      <div *ngIf="assuntos.length === 0 && !loading" class="text-center py-8 text-gray-500">
        Nenhum assunto cadastrado
      </div>

      <div *ngIf="loading" class="text-center py-8">
        Carregando...
      </div>

      <mat-paginator 
        *ngIf="totalCount > 0"
        [length]="totalCount"
        [pageSize]="pageSize"
        [pageSizeOptions]="[5, 10, 25, 50, 100]"
        [pageIndex]="pageIndex"
        (page)="onPageChange($event)"
        showFirstLastButtons>
      </mat-paginator>
    </mat-card-content>
  </mat-card>
</div>
