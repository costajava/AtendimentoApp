<div class="container-custom">
  <div class="page-header">
    <h1 class="text-3xl font-bold">Tipos de Atendimento</h1>
    <button mat-raised-button color="primary" routerLink="/tipos-atendimento/novo">
      <mat-icon>add</mat-icon>
      Novo Tipo de Atendimento
    </button>
  </div>

  <mat-card>
    <mat-card-content>
      <div class="filter-section mb-4">
        <mat-form-field appearance="fill" class="w-full md:w-96">
          <mat-label>Filtrar por descrição</mat-label>
          <input matInput #campoFiltro [(ngModel)]="filtroDescricao" (keyup.enter)="aplicarFiltro()" placeholder="Digite a descrição">
          <button mat-icon-button matSuffix (click)="aplicarFiltro()" *ngIf="filtroDescricao">
            <mat-icon>search</mat-icon>
          </button>
          <button mat-icon-button matSuffix (click)="limparFiltro()" *ngIf="filtroDescricao">
            <mat-icon>clear</mat-icon>
          </button>
        </mat-form-field>
      </div>

      <div class="table-container">
        <table mat-table [dataSource]="tipos" class="w-full">
          <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef>ID</th>
            <td mat-cell *matCellDef="let tipo">{{ tipo.id }}</td>
          </ng-container>

          <ng-container matColumnDef="descricao">
            <th mat-header-cell *matHeaderCellDef>Descrição</th>
            <td mat-cell *matCellDef="let tipo">{{ tipo.descricao }}</td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef class="text-right">Ações</th>
            <td mat-cell *matCellDef="let tipo" class="text-right">
              <button mat-icon-button color="primary" [routerLink]="['/tipos-atendimento', tipo.id]">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button color="warn" (click)="deleteTipo(tipo.id)">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
      </div>

      <div *ngIf="tipos.length === 0 && !loading" class="text-center py-8 text-gray-500">
        Nenhum tipo de atendimento cadastrado
      </div>

      <mat-paginator 
        *ngIf="totalCount > 0"
        [length]="totalCount"
        [pageSize]="pageSize"
        [pageSizeOptions]="[5, 10, 25, 50, 100]"
        [pageIndex]="pageIndex"
        (page)="onPageChange($event)"
        showFirstLastButtons>
      </mat-paginator>
    </mat-card-content>
  </mat-card>
</div>
