<div class="container-custom">
  <h1 class="text-3xl font-bold mb-6">{{ isEditMode ? 'Editar' : 'Novo' }} Módulo</h1>

  <!-- Bloco de erros -->
  <div *ngIf="errorMessages.length > 0" class="error-summary">
    <mat-card class="mat-elevation-z2 error-card">
      <mat-card-header>
        <mat-card-title>Erros de validação</mat-card-title>
        <button mat-icon-button (click)="$event.stopPropagation(); clearErrorMessages($event)" class="close-button" aria-label="Fechar">
          <mat-icon>close</mat-icon>
        </button>
      </mat-card-header>
      <mat-card-content>
        <ul>
          <li *ngFor="let error of errorMessages">{{error}}</li>
        </ul>
      </mat-card-content>
    </mat-card>
  </div>

  <mat-card>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4 max-w-2xl">
        <mat-form-field appearance="fill">
          <mat-label>Nome</mat-label>
          <input matInput #primeiroCampo formControlName="nome" placeholder="Digite o nome do módulo">
          <mat-error *ngIf="form.get('nome')?.hasError('required')">
            Nome é obrigatório
          </mat-error>
          <mat-error *ngIf="form.get('nome')?.hasError('maxlength')">
            Nome deve ter no máximo 100 caracteres
          </mat-error>
        </mat-form-field>

        <div class="action-buttons">
          <button mat-raised-button type="button" (click)="onCancel()">
            Cancelar
          </button>
          <button mat-raised-button color="primary" type="submit" [disabled]="!form.valid || loading">
            {{ isEditMode ? 'Atualizar' : 'Salvar' }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
